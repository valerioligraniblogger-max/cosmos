<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Countdown 2027</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Rajdhani',sans-serif;
background: radial-gradient(circle at top,#0b1b3a,#05060f 60%,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* sfondo glow animato */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(0,255,255,.15),transparent 70%);
filter:blur(60px);
top:-100px;
left:-100px;
animation:float 8s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(80px,60px);}
}

.container{
position:relative;
text-align:center;
padding:50px 40px;
background:rgba(255,255,255,0.05);
border-radius:25px;
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(0,255,255,.12);
width:90%;
max-width:720px;
border:1px solid rgba(0,255,255,.15);
}

h1{
font-family:'Orbitron',sans-serif;
color:#7ffcff;
margin-bottom:10px;
letter-spacing:2px;
text-shadow:0 0 15px rgba(0,255,255,.35);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.02);}
}

.description{
color:#b9e9ff;
margin-bottom:25px;
opacity:.9;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.box{
background:rgba(0,255,255,.06);
padding:18px;
border-radius:18px;
text-align:center;
border:1px solid rgba(0,255,255,.1);
transition:0.3s ease;
box-shadow:0 0 10px rgba(0,255,255,.05);
}

.box:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,255,255,.25);
border-color:rgba(0,255,255,.3);
}

.number{
font-size:2.4rem;
font-family:'Orbitron';
color:#9ffcff;
text-shadow:0 0 12px rgba(0,255,255,.4);
}

.label{
font-size:.85rem;
text-transform:uppercase;
margin-top:5px;
letter-spacing:1px;
color:#cdefff;
}
</style>
</head>

<body>

<div class="container">

<h1>IL GRANDE EVENTO COSMOS STA ARRIVANDO!</h1>

<div class="description">
Il futuro è in attesa...
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">00</div>
<div class="label">Giorni</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Ore</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minuti</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Secondi</div>
</div>

</div>

</div>

<script>

const targetDate = new Date("2027-06-25T00:00:00");

function tick(){
const now = new Date().getTime();
const distance = targetDate - now;

if(distance <= 0){
document.getElementById("days").textContent="00";
document.getElementById("hours").textContent="00";
document.getElementById("minutes").textContent="00";
document.getElementById("seconds").textContent="00";
return;
}

document.getElementById("days").textContent =
String(Math.floor(distance/(1000*60*60*24))).padStart(2,"0");

document.getElementById("hours").textContent =
String(Math.floor((distance/(1000*60*60))%24)).padStart(2,"0");

document.getElementById("minutes").textContent =
String(Math.floor((distance/(1000*60))%60)).padStart(2,"0");

document.getElementById("seconds").textContent =
String(Math.floor((distance/1000)%60)).padStart(2,"0");
}

setInterval(tick,1000);
tick();

</script>

</body>
</html>
