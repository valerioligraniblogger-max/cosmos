<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Countdown Futuristico Spaziale</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Rajdhani',sans-serif;
background:#060816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,255,255,.2);
width:90%;
max-width:700px;
}

h1{
font-family:'Orbitron',sans-serif;
font-size:3rem;
color:#8efaff;
margin-bottom:20px;
}

.description{
font-size:1.2rem;
margin-bottom:30px;
color:#c6e8ff;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.box{
background:rgba(0,255,255,.08);
padding:20px;
border-radius:15px;
}

.number{
font-size:2.2rem;
font-family:'Orbitron',sans-serif;
color:#9afcff;
}

.label{
margin-top:10px;
font-size:.9rem;
letter-spacing:2px;
text-transform:uppercase;
}
</style>
</head>

<body>

<div class="container">

<h1>Missione Andromeda</h1>

<div class="description">
Il segnale è stato rilevato oltre il bordo conosciuto.
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">00</div>
<div class="label">Giorni</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Ore</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minuti</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Secondi</div>
</div>

</div>
</div>

<script>

let targetDate = new Date();
targetDate.setDate(targetDate.getDate()+10);

function tick(){

const now = new Date().getTime();
const distance = targetDate.getTime()-now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance/(1000*60*60))%24);
const minutes = Math.floor((distance/(1000*60))%60);
const seconds = Math.floor((distance/1000)%60);

document.getElementById('days').textContent =
String(days).padStart(2,'0');

document.getElementById('hours').textContent =
String(hours).padStart(2,'0');

document.getElementById('minutes').textContent =
String(minutes).padStart(2,'0');

document.getElementById('seconds').textContent =
String(seconds).padStart(2,'0');
}

setInterval(tick,1000);
tick();

</script>

</body>
</html>
